<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <!-- Fondo degradado principal -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2B4A;stop-opacity:1" />
    </linearGradient>
    <!-- Degradado círculo decorativo -->
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6B4F7A;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6B4F7A;stop-opacity:0" />
    </radialGradient>
    <!-- Degradado línea separadora -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1080" fill="url(#bgGrad)" />

  <!-- Círculos decorativos de fondo -->
  <circle cx="950" cy="180" r="350" fill="url(#circleGrad)" />
  <circle cx="130" cy="900" r="280" fill="url(#circleGrad)" />

  <!-- Grid pattern sutil (líneas) -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
