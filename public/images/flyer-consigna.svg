  <text x="732" y="655" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">WhatsApp</text>
  <text x="732" y="677" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="26" fill="#9B59B6">291 578-8671</text>

