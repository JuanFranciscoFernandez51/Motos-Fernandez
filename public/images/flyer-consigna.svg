  <!-- Pin icon -->
  <path d="M680 820 C680 812 687.2 806 696 806 C704.8 806 712 812 712 820 C712 826 696 842 696 842 C696 842 680 826 680 820 Z" fill="none" stroke="#AAA9A9" stroke-width="1.5" />
  <circle cx="696" cy="820" r="4" fill="#AAA9A9" />

  <text x="720" y="818" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#AAA9A9">Brown 1052</text>
  <text x="720" y="836" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#FFFFFF">Bahía Blanca, Buenos Aires</text>

