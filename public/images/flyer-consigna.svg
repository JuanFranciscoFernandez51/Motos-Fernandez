  <circle cx="100" cy="650" r="18" fill="none" stroke="#9B59B6" stroke-width="1.5" />
  <path d="M91 650 L97 656 L110 643" stroke="#9B59B6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <text x="132" y="643" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#FFFFFF">Tasación gratuita</text>
